version: "3.10"

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: airflow/Dockerfile
  env_file:
    - airflow/.env
  environment:
    AIRFLOW_HOME: /airflow
    PYTHONPATH: /airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__DEFAULT_DATETIME: "2026-01-01T00:00:00"
    AIRFLOW__CORE__EXECUTE_ROUTES_DYNAMICALLY: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "sqlite:///${AIRFLOW_HOME}/airflow.db"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS_TO_METADATA: "false"
  volumes:
    - ../pipeline:/airflow/pipeline:ro
    - ../data:/airflow/data:rw
    - ./dags:/airflow/dags:ro
    - airflow_home:/airflow
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    airflow-init:
      condition: service_completed_successfully

services:
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow pool set etl_pool 16
        airflow connections add default --conn-id=default --conn-type=sqlite
    user: "0:0"
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl --fail http://localhost:8080/health || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test:
        - "CMD-SHELL"
        - "AIRFLOW_HOME=/airflow airflow jobs check --job-type SchedulerJob || AIRFLOW_HOME=/airflow airflow scheduler --job-id 1"
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test:
        - "CMD-SHELL"
        - "AIRFLOW_HOME=/airflow airflow triggerer --health"
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - "AIRFLOW_HOME=/airflow celery --app airflow.executors.celery.executor inspect ping"
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
    profiles:
      - celery

  flower:
    <<: *airflow-common
    command: celery flowers
    ports:
      - "5555:5555"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl --fail http://localhost:5555/ || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
    profiles:
      - celery

volumes:
  airflow_home:
  postgres_db:
